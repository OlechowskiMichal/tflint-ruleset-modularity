version: "3"

tasks:
  build:
    desc: Build custom golangci-lint with plugins
    cmds:
      - golangci-lint custom
    status:
      - test -f custom-gcl

  default:
    desc: Run linters
    deps: [build]
    cmds:
      - ./custom-gcl run ./...

  fix:
    desc: Run linters and fix issues
    deps: [build]
    cmds:
      - ./custom-gcl run --fix ./...

  fast:
    desc: Lint only changed files
    deps: [build]
    cmds:
      - ./custom-gcl run --new-from-rev=HEAD ./...

  fmt:
    desc: Format code
    cmds:
      - gofumpt -w .
      - goimports -w .

  fmt:check:
    desc: Check code formatting
    cmds:
      - test -z "$(gofmt -l .)"

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  tidy:check:
    desc: Check go modules are tidy
    cmds:
      - go mod tidy && git diff --exit-code go.mod go.sum

  vulncheck:
    desc: Check for security vulnerabilities
    cmds:
      - govulncheck ./...

  errcheck:
    desc: Check for unchecked errors
    cmds:
      - errcheck -blank -exclude .errcheck_excludes.txt ./...

  cyclomatic:
    desc: Check cyclomatic complexity
    cmds:
      - gocyclo -over 10 .

  cognitive:
    desc: Check cognitive complexity
    cmds:
      - gocognit -over 15 .

  security:
    desc: Run security scanner
    cmds:
      - gosec -quiet ./...

  mocks:
    desc: Generate mocks
    cmds:
      - go generate ./...

  complexity:
    desc: Show complexity report
    cmds:
      - |
        echo "=== Cyclomatic Complexity (>10) ==="
        gocyclo -over 10 . || true
        echo ""
        echo "=== Cognitive Complexity (>15) ==="
        gocognit -over 15 . || true
        echo ""
        echo "=== Averages ==="
        gocyclo -avg .
        gocognit -avg .
