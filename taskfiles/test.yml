version: "3"

tasks:
  default:
    desc: Run all tests
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...

  unit:
    desc: Run unit tests only
    cmds:
      - go test -v -short ./...

  race:
    desc: Run tests with race detector
    cmds:
      - go test -race -short ./...

  benchmark:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  coverage:
    desc: Generate test coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - go tool cover -func=coverage.out | grep '^total:'

  coverage:check:
    desc: Run tests and check coverage meets threshold
    cmds:
      - |
        trap 'rm -f coverage.txt' EXIT
        go test -race -short -coverprofile=coverage.txt -covermode=atomic ./...
        COVERAGE=$(go tool cover -func=coverage.txt | grep '^total:' | awk '{print $3}' | tr -d '%')
        THRESHOLD=50
        if awk -v c="$COVERAGE" -v t="$THRESHOLD" 'BEGIN {exit !(c < t)}'; then
          echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
          exit 1
        fi
        echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
