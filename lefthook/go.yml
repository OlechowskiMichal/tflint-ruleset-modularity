pre-commit:
  commands:
    mod-tidy:
      glob: "**/*.go"
      run: task lint:tidy:check
      fail_text: "go mod tidy made changes"

    fmt:
      glob: "**/*.go"
      run: task lint:fmt:check
      fail_text: "gofmt found unformatted files"

    vet:
      glob: "**/*.go"
      run: task lint:vet
      fail_text: "go vet found issues"

    lint:
      glob: "**/*.go"
      run: task lint:fast
      fail_text: "golangci-lint found issues"

    errcheck:
      glob: "**/*.go"
      run: task lint:errcheck
      fail_text: "errcheck found unchecked errors"

    cyclomatic:
      glob: "**/*.go"
      run: task lint:cyclomatic
      fail_text: "cyclomatic complexity > 10"

    cognitive:
      glob: "**/*.go"
      run: task lint:cognitive
      fail_text: "cognitive complexity > 15"

    file-size:
      glob: "**/*.go"
      run: task hooks:file-size
      fail_text: "source files must be ≤300 lines (tests and mocks excluded)"

    security:
      glob: "**/*.go"
      run: task lint:security
      fail_text: "gosec found security issues"

    test:
      glob: "**/*.go"
      run: task test:unit
      fail_text: "tests failed"

pre-push:
  commands:
    full-lint:
      run: task lint
      fail_text: "full lint failed"

    coverage:
      run: task test:coverage:check
      fail_text: "coverage below 50% threshold"

    vulncheck:
      run: task lint:vulncheck
      fail_text: "known vulnerabilities found"
